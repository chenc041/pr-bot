# action.yml
name: 'PatchFox Bot'
description: 'AI-driven code review for pull requests'
author: 'chenc'

branding:
  icon: 'git-pull-request'
  color: 'orange'

inputs:
  anthropic_api_key:
    description: 'Anthropic API key (for Claude)'
    required: false
  openai_api_key:
    description: 'OpenAI API key'
    required: false
  deepseek_api_key:
    description: 'DeepSeek API key'
    required: false
  custom_api_key:
    description: 'Custom LLM API key'
    required: false

runs:
  using: 'node20'
  main: 'dist/index.js'
